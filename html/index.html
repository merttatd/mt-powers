<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Güç Menüsü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="power-menu">
        <div class="menu-card">
            <div class="header">
                <div>
                    <h1>Doğaüstü Güçler</h1>
                    <p>Kullanmak istediğin gücü seç.</p>
                </div>

                <button id="close-btn">×</button>
            </div>

            <div class="power-list">
                <div class="power-card" data-power="electric">
                    <div class="icon">⚡</div>
                    <div class="info">
                        <h2>Elektrik Gücü</h2>
                        <p>Elektriği keser, araçları durdurur ve çevreyi etkiler.</p>
                        <span>Tuş: N</span>
                    </div>
                    <button>Seç</button>
                </div>

                <div class="power-card" data-power="shadow">
                    <div class="icon">🌑</div>
                    <div class="info">
                        <h2>Gölge Gücü</h2>
                        <p>Gölge formuna geçer, görünmez olur, hızlı koşar ve yükseğe zıplar.</p>
                        <span>Tuş: B</span>
                    </div>
                    <button>Seç</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
